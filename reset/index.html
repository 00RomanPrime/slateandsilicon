<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0c0d">
  <title>Reset — Slate & Silicon</title>
  <meta name="description" content="A simple 7-day reset to get your attention back.">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XZ84PSHRX9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);} 
    gtag('js', new Date());
    gtag('config', 'G-XZ84PSHRX9');
  </script>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { background:#0b0c0d; color:#e8e2d6; font-family:Inter,system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
    .reset-container { max-width:420px; width:100%; }
    h1 { font-size:2.2rem; line-height:1.05; letter-spacing:-0.02em; margin-bottom:1rem; }
    p { color:#9b9890; font-size:0.95rem; margin-bottom:1.5rem; }

    .cta {
      display:block;
      width:100%;
      height:56px;
      background:linear-gradient(180deg,#9fc2cf 0%,#7fa7b8 100%);
      color:#0b0c0d;
      font-weight:900;
      font-size:0.85rem;
      letter-spacing:0.1em;
      text-transform:uppercase;
      text-align:center;
      line-height:56px;
      border-radius:6px;
      box-shadow:0 6px 18px rgba(127,167,184,0.25),0 1px 0 rgba(255,255,255,0.15) inset;
      transition:transform 0.08s ease, box-shadow 0.08s ease;
      text-decoration:none;
      animation:ctaPulse 3.5s infinite;
    }

    .cta:active {
      transform:scale(0.97);
      box-shadow:0 2px 8px rgba(127,167,184,0.2),0 1px 0 rgba(255,255,255,0.1) inset;
    }

    .cta::after {
      content:"→";
      margin-left:6px;
      transition:transform 0.2s ease;
    }

    .cta:hover::after {
      transform:translateX(3px);
    }

    .cta:focus {
      outline:none;
      box-shadow:0 0 0 2px rgba(138,168,180,0.6),0 6px 18px rgba(127,167,184,0.25);
    }

    @keyframes ctaPulse {
      0% { box-shadow:0 0 0 0 rgba(138,168,180,0.4); }
      70% { box-shadow:0 0 0 10px rgba(138,168,180,0); }
      100% { box-shadow:0 0 0 0 rgba(138,168,180,0); }
    }

    .cta-support {
      font-size:0.75rem;
      color:#7a807e;
      margin-top:0.6rem;
      text-align:center;
    }

    .micro { font-size:0.75rem; color:#626866; margin-bottom:1.5rem; }

    .links a { display:block; font-size:0.8rem; color:#9b9890; text-decoration:none; margin-top:1rem; }
    .links a:hover { color:#8aa8b4; }
  </style>
</head>
<body>
  <div class="reset-container">

    <h1>
      You don’t need more discipline.<br>
      You need less noise.
    </h1>

    <p>
      A simple 7-day reset to help you think clearly again.
    </p>

    <a href="/detox-planner/" class="cta" onclick="gtag('event','reset_download_click')">
      Get the Reset
    </a>

    <p class="cta-support">No signup friction. Instant access.</p>

    <div class="micro">
      Takes less than a minute. Most people start immediately.
    </div>

    <div class="links">
      <a href="/laboratory/">Enter the Laboratory</a>
    </div>

  </div>

<script>
window.addEventListener('scroll', function() {
  const cta = document.querySelector('.cta');
  if (window.scrollY > 5) {
    cta.style.transform = 'scale(1.02)';
  } else {
    cta.style.transform = 'scale(1)';
  }
});
</script>

</body>
</html>
